name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run test

  build:
    name: Build (${{ matrix.suffix }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            suffix: linux-x64
          - target: bun-linux-arm64
            suffix: linux-arm64
          - target: bun-darwin-x64
            suffix: darwin-x64
          - target: bun-darwin-arm64
            suffix: darwin-arm64
          - target: bun-windows-x64
            suffix: windows-x64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Compile CLI
        run: |
          mkdir -p dist
          bun build packages/cli/src/bin.ts \
            --compile \
            --minify \
            --target=${{ matrix.target }} \
            --outfile dist/rollbar-${{ matrix.suffix }}

      - name: Compile MCP
        run: |
          bun build packages/mcp/src/index.ts \
            --compile \
            --minify \
            --target=${{ matrix.target }} \
            --outfile dist/rollbar-mcp-${{ matrix.suffix }} \
            --external sury \
            --external @valibot/to-json-schema \
            --external effect

      # Bun's --compile auto-appends .exe for bun-windows-* targets, so the
      # outfile lands at e.g. dist/rollbar-windows-x64.exe directly — no rename needed.

      - name: Smoke test (linux-x64 only)
        if: matrix.suffix == 'linux-x64'
        run: ./dist/rollbar-linux-x64 --help

      - name: Generate per-asset checksums
        working-directory: dist
        shell: bash
        run: |
          for f in rollbar-* rollbar-mcp-*; do
            case "$f" in
              *.sha256) continue ;;
            esac
            shasum -a 256 "$f" > "$f.sha256"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Aggregate SHA256SUMS
        run: |
          cd artifacts
          shasum -a 256 rollbar-* rollbar-mcp-* | grep -v '\.sha256$' | sort > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/*
